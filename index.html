<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THỐNG KÊ HÀNG HÓA</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <div id="header-icon"></div>
            <input type="text" id="search-input" placeholder="Tìm kiếm...">
        </div>
        <div id="main"></div>
    </div>
    <div id="btn-menu">
        <div class="add-btn-item"></div>
        <div class="setup-btn-item"></div>
        <div class="cmd-btn-item"></div>
    </div>
    <div id="setupPanel">
        <div id="date-setup">
            Tháng:
            <select name="month" id="month-setup">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
            </select>
            Năm:
            <select name="year" id="year-setup"></select>
            <div class="editBtn">edit</div>
        </div>
        <div class="slide"></div>
        <div id="styles-setup">
            Loại:
            <div class="checked-styles-setup">
                <input type="checkbox" name="boloc" id="checkbox-style-all">
                <label for="checkbox-style-all">Tất cả</label>
            </div>
            <div id="styles-setup-content"></div>
            <div class="editBtn">edit</div>
        </div>
        <div class="slide"></div>
        <div id="fashions-setup">
            Shops:
            <div class="checked-fashions-setup">
                <input type="checkbox" name="boloc" id="checkbox-fashion-all">
                <label for="checkbox-fashion-all">Tất cả</label>
            </div>
            <div id="fashions-setup-content"></div>
            <div class="editBtn">edit</div>
        </div>
        <div class="slide"></div>
        <div id="checked-setup">
            <input type="checkbox" name="boloc" id="checkbox-boloc">
            <label for="checkbox-boloc">Bật bộ lọc</label>
        </div>
    </div>
    <div id="cmdPanel"></div>
    <div id="editMenu">
        <div id="edit-menu-contents"></div>
        <div id="edit-menu-btns">
            <div id="edit-menu-btn-add">Thêm</div>
            <div id="edit-menu-btn-apply">Xác nhận</div>
            <div id="edit-menu-btn-close">Đóng</div>
        </div>
    </div>
    <div id="addSpMenu">
        <div id="add-sp-menu-content">
            <img src="icon/image.png" alt="" id="add-sp-image-box">
            <div>
                Tên:
                <input type="text" id="add-sp-name-input" style="flex: 1;">
            </div>
            <div>
                Size:
                <input type="text" id="add-sp-size-input" style="width: 42%;">
                Mã: #
                <input type="number" id="add-sp-code-input" style="width: 17%;" value="0">
            </div>
            <div>
                Ngày:
                <input type="date" id="add-sp-date-input" style="width: 100%;">
            </div>
            <div>
                Hiệu:
                <select name="actor" id="add-sp-actor-input" style="flex: 1;"></select>
                Kiểu:
                <select name="group" id="add-sp-group-input" style="flex: 1;"></select>
            </div>
            <div class="add-sp-item">
                <input type="text" placeholder="Màu ..." style="flex: 1;">:
                <input type="number" placeholder="Số lượng ..." value="0" style="width: 20%;">
            </div>
            <div id="add-sp-items" style="margin-top: 0;"></div>
            <div style="width: 100%; height: 40%; color: transparent;">.</div>
        </div>
        <div id="add-sp-btns">
            <div id="sp-btn-add">Thêm</div>
            <div id="sp-btn-apply">Xác nhận</div>
            <div id="sp-btn-close">Đóng</div>
        </div>
    </div>
    <div id="loading">
        <div id="loading-bar">
            <div id="loading-bar-fill"></div>
        </div>
        <span id="loading-text">100%</span>
    </div>
    <div id="image-input-bar">
        <div id="image-input-search-bar">
            <input type="text" id="image-search-input" placeholder="Nhập tên ảnh ...">
        </div>
        <div id="image-input-bar-contents"></div>
        <div id="image-input-bar-btns">
            <input type="file" id="image-input-item-load" accept="image/*" style="display: none;" multiple>
            <div id="image-input-bar-btn-add">Thêm</div>
            <div id="image-input-bar-btn-remove">Xóa</div>
            <div id="image-input-bar-btn-apply">Xác nhận</div>
            <div id="image-input-bar-btn-close">Đóng</div>
        </div>
    </div>
    <script type="module" src="main.js"></script> 
</body>
</html>
